<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="{{ url_for('static', filename='img/fav/favicon.ico') }}" type="image">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='img/fav/apple-touch-icon.png') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='img/fav/favicon-32x32.png') }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='img/fav/favicon-16x16.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
  <title>{% block title %}YaCut{% endblock %}</title>
</head>

<body>
  {% include 'includes/header.html' %}

  <main>
    <div class="container">
      <div class="row">
        <div class="col-sm">
        </div>
        <div class="col-sm">
          {% with messages = get_flashed_messages() %}
            {% for message in messages %}
              <p class="text-center"><span style="color:red">{{ message }}</span></p>
            {% endfor %}
          {% endwith %}
        </div>
        <div class="col-sm">
        </div>
      </div>
    </div>

    {% block content %}{% endblock %}
  </main>

  {% include 'includes/footer.html' %}

  <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
</body>

</html>
